services:
  server:
    image: chamara133/todo-server:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 5002
      MYSQL_HOST: host.docker.internal
      MYSQL_USER: root
      MYSQL_PASSWORD: 12345678
      MYSQL_DATABASE: todoApp
      JWT_SECRET: change_me_in_production
    ports:
      - "5002:5002"
    volumes:
      - ./uploads:/app/uploads

  client:
    image: chamara133/todo-client:latest
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:3000"
