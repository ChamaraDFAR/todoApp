name: CI/CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SERVER_IMAGE: chamara133/todo-server
  CLIENT_IMAGE: chamara133/todo-client

jobs:
  ci:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build server
        working-directory: ./server
        run: npm ci

      - name: Install and build client
        working-directory: ./client
        run: |
          npm ci
          npm run build

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}

      - name: Build and push client image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./client
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.CLIENT_API_URL }}
          tags: |
            ${{ env.CLIENT_IMAGE }}:latest
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e
            cd ${{ secrets.EC2_APP_PATH }}
            docker compose pull
            docker compose up -d
            docker image prune -f